<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collapse ↑</title>

<link rel="manifest" href="manifest.webmanifest">

<style>
:root {
  --bg-center:#10141b;
  --bg-edge:#0c0f14;
  --core:rgba(240,204,136,1);
}

body{
  margin:0;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:radial-gradient(circle at center,var(--bg-center),var(--bg-edge));
  color:#e8d8b5;
}

#field{
  position:absolute;
  inset:0;
}

.particle{
  position:absolute;
  width:18px;
  height:18px;
  border-radius:50%;
  background:var(--core);
  will-change:transform,opacity,filter,box-shadow;
}

#traits{
  position:absolute;
  bottom:8%;
  width:100%;
  text-align:center;
  opacity:0;
  filter:blur(4px);
  transition:opacity .6s ease, filter .6s ease;
}

#traits.visible{
  opacity:1;
  filter:blur(0);
}

.trait{
  display:inline-block;
  margin:8px 14px;
  cursor:pointer;
  opacity:1;
  transition:opacity .4s ease;
}

.trait.dim{ opacity:.3; }

#cue{
  position:absolute;
  top:20%;
  width:100%;
  text-align:center;
  opacity:0;
  transition:opacity .6s ease;
  white-space:pre-line;
}

#cue.visible{ opacity:1; }

#explain{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px;
  background:rgba(12,15,20,.78);
  white-space:pre-line;
}

#explain.visible{ display:flex; }

#lang{
  position:absolute;
  top:18px;
  right:20px;
  font-size:14px;
  opacity:.5;
  cursor:pointer;
}

#lang:hover{ opacity:.9; }

</style>
</head>

<body>

<div id="field"></div>
<div id="traits"></div>
<div id="cue"></div>
<div id="explain"></div>
<div id="lang">EN · ES</div>

<script src="data.js?v=1.0.0"></script>
<script src="app.js?v=1.0.0"></script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
