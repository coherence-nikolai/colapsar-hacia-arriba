<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Collapse ↑</title>

<link rel="manifest" href="manifest.webmanifest">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #000;
  color: #c9b37e;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100vh;
  overflow: hidden;
}

.topbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 18px 20px;
  z-index: 10;
  font-size: 15px;
  letter-spacing: 1px;
}

.topbar button {
  background: none;
  border: none;
  color: #c9b37e;
  font-size: 15px;
  letter-spacing: 1px;
  cursor: pointer;
}

#app {
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.screen {
  display: none;
  text-align: center;
  padding: 30px;
  max-width: 700px;
}

.screen.active {
  display: block;
}

#debugPanel {
  position: fixed;
  bottom: 20px;
  left: 20px;
  right: 20px;
  background: #111;
  border: 1px solid #333;
  padding: 12px;
  font-size: 13px;
  color: #ddd;
  display: none;
  z-index: 100;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="topbar">
  <button id="langBtn">EN / ES</button>
  <button id="fontBtn">A+</button>
</div>

<div id="app">
  <div id="mainScreen" class="screen active">
    <h1>Collapse ↑</h1>
  </div>
</div>

<div id="debugPanel"></div>

<script>
/* ---------- DEBUG ---------- */
const dbgPanel = document.getElementById("debugPanel");
function dbg(msg) {
  dbgPanel.style.display = "block";
  dbgPanel.innerHTML += "<div>" + msg + "</div>";
}
dbg("boot v36 clean");

window.addEventListener("error", e => {
  dbg("ERROR: " + e.message);
});
window.addEventListener("unhandledrejection", e => {
  dbg("PROMISE ERROR: " + e.reason);
});
</script>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
